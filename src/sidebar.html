<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Parallel Translator Sidebar</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      padding: 1rem;
      background-color: var(--background);
      color: var(--foreground);
      font-size: 15px;
    }

    .sidebar-container {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      height: 100vh;
      overflow: hidden;
    }

    .column {
      flex: 1;
      overflow-y: auto;
      background-color: var(--surface);
      padding: 1em;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow);
    }

    .column h2 {
      font-size: 1em;
      margin-bottom: 0.5em;
      color: var(--text-secondary);
    }

    .line {
      margin-bottom: 0.75em;
      line-height: 1.4;
      min-height: 1.4em; /* Helps align lines */
      white-space: pre-wrap; /* Respects newlines in text */
    }

    .loading-text {
      color: var(--text-secondary);
      font-style: italic;
      text-align: center;
      margin-top: 2em;
    }

    .error-text {
      color: var(--error);
      font-style: italic;
      text-align: center;
      margin-top: 2em;
    }
  </style>
</head>
<body>
  <div class="sidebar-container">
    <div class="column" id="original">
      <h2 class="gradient-text">Original</h2>
    </div>
    <div class="column" id="translated">
      <h2 class="gradient-text-accent">Translation</h2>
    </div>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
