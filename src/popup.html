<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parallel Reading</title>
  <link rel="stylesheet" href="styles.css">

</head>
<body>
  <div class="container popup-container">
    <h1 class="gradient-text">Parallel Reading</h1>
    <p class="popup-description">Translate web page: English ↔ Spanish</p>
    <div class="button-group">
      <button id="scan-button" class="btn btn-green">
        <span class="gradient-text">Translate</span>
      </button>
      <button id="settings-button" class="btn btn-grey">
        <span class="gradient-text">Settings</span>
      </button>
      <div id="status-message" style="margin-top: 1em; min-height: 1.5em; text-align: center;"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
